<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - leaseycam</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navigation Header -->
  <header>
    <a href="/" class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-accent">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      <span>leaseycam</span><span class="logo-dot"></span>
    </a>
    
    <ul class="nav-links">
      <li><a href="/">Catalog</a></li>
      <li><a href="/terms.html">How it works</a></li>
      <li><a href="/bookings.html" class="active" id="bookings-link" style="display: none;">My Bookings</a></li>
      <li><a href="/admin.html" id="admin-link" style="display: none;">Admin Panel</a></li>
    </ul>

    <div class="nav-actions">
      <!-- Dark mode toggle -->
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle Theme">
        <svg id="theme-sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="theme-moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <div class="user-status" id="auth-status-container"></div>
    </div>
  </header>

  <!-- Bookings Portal -->
  <main>
    <div class="booking-portal">
      <h1 style="font-size: 2rem; margin-bottom: 24px; font-family: var(--font-display);">My Bookings</h1>

      <div class="booking-tabs" style="margin-bottom: 30px;">
        <button class="booking-tab-btn active" id="tab-active-btn">Active & Pending</button>
        <button class="booking-tab-btn" id="tab-history-btn">Rental History</button>
      </div>

      <div id="bookings-list-container">
        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
          Loading your bookings...
        </div>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
