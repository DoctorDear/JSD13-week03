<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Daily Lens & Gear</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- TopNavBar Header -->
  <header>
    <div class="header-container">
      <a href="/" class="logo-wrapper">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        <span class="logo-text">Daily Lens & Gear</span>
      </a>
      
      <ul class="nav-links">
        <li><a href="/">Catalog</a></li>
        <li><a href="/terms.html">How it works</a></li>
        <li><a href="/bookings.html" class="active" id="bookings-link" style="display: none;">My Bookings</a></li>
        <li><a href="/admin.html" id="admin-link" style="display: none;">Admin Panel</a></li>
      </ul>

      <div class="nav-actions">
        <!-- Theme Toggle -->
        <button class="icon-btn" id="theme-toggle-btn" aria-label="Toggle Theme">
          <span class="material-symbols-outlined" id="theme-moon-icon">dark_mode</span>
          <span class="material-symbols-outlined" id="theme-sun-icon" style="display:none;">light_mode</span>
        </button>

        <div class="user-status" id="auth-status-container"></div>
      </div>
    </div>
  </header>

  <!-- Bookings Portal Main Content -->
  <main>
    <div class="booking-portal">
      <!-- Section Header -->
      <div class="section-header" style="margin-top: 20px; margin-bottom: 24px; display: block;">
        <h1 class="font-display-lg" style="margin-bottom: 8px; color: var(--text-primary);">Manage Your Gear</h1>
        <p class="font-body-lg" style="color: var(--text-secondary); max-width: 600px;">
          Track your current rentals, request cancellation for pending orders, and review your equipment history.
        </p>
      </div>

      <!-- Tabbed Menu -->
      <div class="booking-tabs" style="margin-bottom: 32px;">
        <button class="booking-tab-btn active" id="tab-active-btn">
          <span class="material-symbols-outlined" style="font-size: 20px; margin-right: 4px;">camera</span>
          Active & Pending
        </button>
        <button class="booking-tab-btn" id="tab-history-btn">
          <span class="material-symbols-outlined" style="font-size: 20px; margin-right: 4px;">history</span>
          Rental History
        </button>
      </div>

      <!-- Bookings Cards Container -->
      <div id="bookings-list-container" style="display: flex; flex-direction: column; gap: 20px;">
        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
          Loading your bookings...
        </div>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
