<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In / Register - Daily Lens & Gear</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="shutter-bg min-h-screen flex flex-col">

  <!-- Header -->
  <header>
    <div class="header-container">
      <a href="/" class="logo-wrapper">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        <span class="logo-text">Daily Lens & Gear</span>
      </a>
      
      <ul class="nav-links">
        <li><a href="/">Catalog</a></li>
        <li><a href="/terms.html">How it works</a></li>
      </ul>

      <div class="nav-actions">
        <!-- Theme Toggle -->
        <button class="icon-btn" id="theme-toggle-btn" aria-label="Toggle Theme">
          <span class="material-symbols-outlined" id="theme-moon-icon">dark_mode</span>
          <span class="material-symbols-outlined" id="theme-sun-icon" style="display:none;">light_mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Login/Register Card -->
  <main style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 160px); z-index: 1;">
    <div class="auth-container">
      <!-- Branding Logo & Welcome -->
      <div class="auth-header">
        <img alt="Daily Lens & Gear Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUTVk01xeoochHpnWQ_aqgmv76GU7r-4OB7dmDfAjeamCmomP1Y0b86sMOJsBcOC6QSIzstjTqsSWFw4JLQfYYnqepKEZEeV7cdSr_hyzj_eigDTVtOHiQVHVNHtqayJHrkb24E4YSrvFDJzHO_j3MOUSjQ-px4NjCY7CGHl178QIVRivfmHy1nmjuxKyglQGIwr9T964cWSXC279UJVt1UhVF_l7EwHlF9K_0RRuHw689n1NlEDX6PVutm3E-lOCzkE7oue2SJUM">
        <h2>Welcome Back</h2>
        <p class="font-body-md" style="color: var(--text-secondary); margin-top: 8px;">Professional Camera Rental Portal</p>
      </div>

      <!-- Tabs Toggle -->
      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="login-tab-btn">Sign In</button>
        <button class="auth-tab-btn" id="register-tab-btn">Register</button>
      </div>

      <!-- Sign In Form -->
      <form id="login-form" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="name@professional.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 10px; height: 50px;">
          Sign In
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <div id="login-error-msg" class="auth-error-msg" style="display: none;"></div>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="register-form" style="display: none; flex-direction: column; gap: 20px;">
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" required placeholder="Somchai Jaidee">
        </div>
        <div class="form-group">
          <label for="register-email">Email Address</label>
          <input type="email" id="register-email" required placeholder="name@professional.com">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label for="register-role">Account Type</label>
          <select id="register-role">
            <option value="customer">Customer (Renter)</option>
            <option value="admin">Shop Admin</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 10px; height: 50px;">
          Create Account
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
        <div id="register-error-msg" class="auth-error-msg" style="display: none;"></div>
      </form>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    // Tab Switching Local Logic
    const loginTab = document.getElementById('login-tab-btn');
    const registerTab = document.getElementById('register-tab-btn');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      loginForm.style.display = 'flex';
      registerForm.style.display = 'none';
    });

    registerTab.addEventListener('click', () => {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerForm.style.display = 'flex';
      loginForm.style.display = 'none';
    });
  </script>
</body>
</html>
